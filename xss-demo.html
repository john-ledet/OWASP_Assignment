<!DOCTYPE html>
<html>
  <body>
    <h2>Sign In (Intentionally Vulnerable Demo)</h2>
    <form id="signInForm">
      <input id="userEmail" type="text" placeholder="Enter email"><br><br>
      <input id="userPass" type="password" placeholder="Enter password"><br><br>
      <button type="submit">Submit</button>
    </form>
    <p id="status"></p>

    <script>
      const signInForm = document.getElementById("signInForm");
      const statusText = document.getElementById("status");

      signInForm.addEventListener("submit", async function(event) {
        event.preventDefault();

        const enteredEmail = document.getElementById("userEmail").value.trim();
        const enteredPass = document.getElementById("userPass").value.trim();

        // ❌ Vulnerability #1: Reflecting user input using innerHTML
        if (enteredEmail === "" || enteredPass === "") {
          statusText.innerHTML = "Missing fields for user: " + enteredEmail;
          return;
        }

        try {
          const response = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email: enteredEmail,
              password: enteredPass
            })
          });

          const result = await response.json();

          // ❌ Vulnerability #2: Rendering server response unsafely
          statusText.innerHTML = result.message;

        } catch (error) {
          statusText.innerHTML = "Connection error for: " + enteredEmail;
        }
      });
    </script>
  </body>
</html>
